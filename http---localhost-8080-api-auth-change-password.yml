info:
  name: http://localhost:8080/api/auth/change-password
  type: http
  seq: 3

http:
  method: POST
  url: http://localhost:8080/api/auth/change-password
  headers:
    - name: Authorization
      value: Bearer YOUR_ACCESS_TOKEN
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "currentPassword": "superadmin123",
        "newPassword": "superadmin456"
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
