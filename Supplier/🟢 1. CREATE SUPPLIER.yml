info:
  name: 🟢 1. CREATE SUPPLIER
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:8080/api/suppliers
  headers:
    - name: Authorization
      value: Bearer YOUR_TOKEN
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: "{\r

      \  \"branchId\": 1,\r

      \  \"name\": \"ABC Suppliers\",\r

      \  \"contactPerson\": \"Kamal\",\r

      \  \"phone\": \"0771234567\",\r

      \  \"email\": \"abc@gmail.com\",\r

      \  \"address\": \"Colombo\",\r

      \  \"isActive\": true\r

      }"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
