info:
  name: ADD SUPPLIER ITEM
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:8080/api/suppliers/items
  headers:
    - name: Authorization
      value: Bearer YOUR_TOKEN
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: "{\r

      \  \"branchId\": 1,\r

      \  \"supplierId\": 1,\r

      \  \"itemId\": 1,\r

      \  \"unitId\": 1,\r

      \  \"defaultCostPrice\": 500,\r

      \  \"lastPurchaseCost\": 500,\r

      \  \"isPreferred\": true,\r

      \  \"isActive\": true\r

      }"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
