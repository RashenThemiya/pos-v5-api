docs: |+
  This is new route for the sales order, all item adding to oreder and payment done in this one route. 


  1. Rounding (for round the total value)

  It is completely optional. If you don't need it, just send "rounding": 0 or don't send it at all — the backend already does nvl() on it so null = 0. There's no rule forcing you to put 0.50. 

